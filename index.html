<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>World Cup 2026 — Lịch thi đấu & Live</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #ffffff;
      --muted: rgba(240, 245, 255, 0.88);
      --dim: rgba(220, 228, 240, 0.72);
      --line: rgba(255, 255, 255, 0.18);
      --panel: rgba(5, 16, 28, 0.38);
      --panel-strong: rgba(7, 28, 42, 0.52);
      --read-shadow: 0 1px 2px rgba(0, 0, 0, 0.95), 0 2px 10px rgba(0, 0, 0, 0.8);
      --glass-card: rgba(4, 18, 24, 0.34);
      --green-a: #06291d;
      --green-b: #0a5135;
      --gold: #ffd166;
      --red: #ff4d5f;
      --cyan: #6ae9ff;
      --blue: #10285d;
      --shadow: rgba(0, 0, 0, 0.42);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #05090d;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
    }

    body {
      cursor: default;
    }

    .wallpaper {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 560px;
      isolation: isolate;
      background: #05090d;
    }

    .bg-poster {
      position: absolute;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      background: #05090d;
    }

    /* Làm mờ viền khi ảnh dọc không phủ hết màn hình ngang */
    .bg-poster::before {
      content: "";
      position: absolute;
      inset: -4%;
      background: url("assets/bg-poster.jpg") center / cover no-repeat;
      filter: blur(28px) brightness(0.42) saturate(1.1);
      transform: scale(1.08);
      pointer-events: none;
    }

    .bg-poster img {
      position: relative;
      z-index: 1;
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      image-rendering: auto;
      -webkit-backface-visibility: hidden;
      backface-visibility: hidden;
      transform: translateZ(0);
      pointer-events: none;
      user-select: none;
    }

    /* Chỉ làm tối nhẹ phía dưới để chữ widget đọc được */
    .bg-poster::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 2;
      background: linear-gradient(
        180deg,
        rgba(0, 0, 0, 0) 0%,
        rgba(0, 0, 0, 0.08) 55%,
        rgba(0, 0, 0, 0.28) 100%
      );
      pointer-events: none;
    }

    .wallpaper::before,
    .wallpaper::after {
      display: none;
    }

    #motion {
      position: absolute;
      inset: 0;
      z-index: 1;
      width: 100%;
      height: 100%;
      opacity: 0.34;
      pointer-events: none;
    }

    .light {
      position: absolute;
      top: -16%;
      width: 26%;
      height: 90%;
      z-index: -2;
      filter: blur(0.5rem);
      opacity: 0.48;
      mix-blend-mode: screen;
      transform-origin: top center;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.34), rgba(106, 233, 255, 0.08) 48%, transparent);
      clip-path: polygon(45% 0, 55% 0, 100% 100%, 0 100%);
      animation: sweep 9s ease-in-out infinite;
    }

    .light.left {
      left: 3%;
      transform: rotate(18deg);
    }

    .light.right {
      right: 3%;
      transform: rotate(-18deg);
      animation-delay: -4s;
    }

    .halo {
      position: absolute;
      left: 50%;
      top: 49%;
      width: 38rem;
      height: 38rem;
      z-index: -2;
      border-radius: 50%;
      border: 0.1rem solid rgba(255, 255, 255, 0.09);
      transform: translate(-50%, -50%);
      box-shadow:
        0 0 5rem rgba(106, 233, 255, 0.15),
        inset 0 0 5rem rgba(255, 209, 102, 0.10);
      animation: pulse 4.8s ease-in-out infinite;
    }

    .ribbon {
      position: absolute;
      width: 18rem;
      height: 0.5rem;
      border-radius: 999rem;
      z-index: 0;
      opacity: 0.82;
      filter: drop-shadow(0 0 1.1rem currentColor);
      animation: floatRibbon 7s ease-in-out infinite;
    }

    .ribbon.one {
      left: 10%;
      top: 27%;
      color: var(--red);
      background: linear-gradient(90deg, transparent, var(--red), transparent);
      transform: rotate(-18deg);
    }

    .ribbon.two {
      right: 7%;
      top: 29%;
      color: var(--gold);
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      transform: rotate(16deg);
      animation-delay: -1.8s;
    }

    .ribbon.three {
      left: 16%;
      bottom: 20%;
      color: var(--cyan);
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
      transform: rotate(11deg);
      animation-delay: -3.2s;
    }

    .dashboard {
      position: relative;
      z-index: 3;
      display: grid;
      grid-template-columns: 24rem minmax(34rem, 1fr) 25rem;
      align-items: center;
      gap: 1.5rem;
      width: 100%;
      height: 100%;
      padding: 3rem 2rem 4.4rem 7.25rem;
    }

    .panel {
      width: 100%;
      align-self: center;
      border: 0.1rem solid var(--line);
      border-radius: 0.45rem;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.09), rgba(255, 255, 255, 0.03)),
        var(--panel);
      box-shadow:
        0 0.6rem 2rem rgba(0, 0, 0, 0.22),
        inset 0 0 1.5rem rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(0.55rem);
    }

    .panel-title,
    .panel-kicker,
    .group-name,
    .team-name,
    .match-team-name,
    .table-row {
      text-shadow: var(--read-shadow);
    }

    .standings-panel {
      display: flex;
      flex-direction: column;
      height: min(54rem, calc(100vh - 6rem));
      min-height: 36rem;
      padding: 1rem;
    }

    .fixtures-panel {
      min-height: 36rem;
      padding: 1rem;
    }

    .panel-head {
      display: flex;
      flex-shrink: 0;
      align-items: end;
      justify-content: space-between;
      gap: 1rem;
      padding-bottom: 0.8rem;
      border-bottom: 0.1rem solid rgba(255, 255, 255, 0.12);
    }

    .panel-title {
      margin: 0;
      font-size: 1rem;
      line-height: 1.2;
      font-weight: 900;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .panel-kicker {
      color: var(--muted);
      font-size: 0.72rem;
      line-height: 1.2;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .panel-tools {
      display: grid;
      justify-items: end;
      gap: 0.4rem;
    }

    .group-controls {
      display: inline-grid;
      grid-template-columns: repeat(3, 2.6rem);
      gap: 0.24rem;
      padding: 0.16rem;
      border: 0.1rem solid rgba(255, 255, 255, 0.12);
      border-radius: 0.35rem;
      background: rgba(0, 0, 0, 0.18);
    }

    .group-button {
      min-width: 0;
      height: 1.55rem;
      border: 0;
      border-radius: 0.24rem;
      background: transparent;
      color: rgba(248, 251, 255, 0.64);
      font: inherit;
      font-size: 0.66rem;
      font-weight: 900;
      letter-spacing: 0;
      cursor: pointer;
    }

    .group-button:hover,
    .group-button:focus-visible {
      color: var(--ink);
      outline: 0;
      background: rgba(255, 255, 255, 0.12);
    }

    .group-button.active {
      color: #07121a;
      background: var(--gold);
      box-shadow: 0 0 1rem rgba(255, 209, 102, 0.28);
    }

    .standings-scroll {
      flex: 1;
      min-height: 0;
      margin-top: 0.9rem;
      overflow-x: hidden;
      overflow-y: auto;
      overscroll-behavior: contain;
      padding-right: 0.4rem;
      scrollbar-color: rgba(255, 209, 102, 0.9) rgba(255, 255, 255, 0.10);
      scrollbar-width: auto;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-y;
    }

    .standings-scroll::-webkit-scrollbar,
    .fixtures-list::-webkit-scrollbar {
      width: 0.55rem;
    }

    .standings-scroll::-webkit-scrollbar-thumb,
    .fixtures-list::-webkit-scrollbar-thumb {
      background: rgba(255, 209, 102, 0.85);
      border-radius: 999rem;
      min-height: 2.5rem;
    }

    .standings-scroll::-webkit-scrollbar-track,
    .fixtures-list::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 999rem;
    }

    .group-card {
      margin-bottom: 0.65rem;
      padding: 0.7rem 0.75rem;
      border: 0.1rem solid rgba(255, 255, 255, 0.12);
      border-radius: 0.4rem;
      background: var(--glass-card);
      animation: groupFade 420ms ease-out both;
    }

    .group-card:last-child {
      margin-bottom: 0;
    }

    .group-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.5rem;
    }

    .group-name {
      font-size: 0.82rem;
      font-weight: 900;
      color: var(--gold);
      text-transform: uppercase;
    }

    .group-status {
      color: #c8d8ec;
      text-shadow: var(--read-shadow);
      font-size: 0.68rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    .table-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 1.2rem 1.2rem 1.2rem 1.5rem 1.7rem;
      align-items: center;
      gap: 0.3rem;
      min-height: 1.62rem;
      color: rgba(248, 251, 255, 0.9);
      font-size: 0.76rem;
      font-variant-numeric: tabular-nums;
      border-top: 0.1rem solid rgba(255, 255, 255, 0.07);
    }

    .table-row.header {
      min-height: 1.25rem;
      color: var(--dim);
      font-size: 0.58rem;
      font-weight: 900;
      text-transform: uppercase;
      border-top: 0;
    }

    .team-cell {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      min-width: 0;
      font-weight: 800;
    }

    .team-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .flag-img {
      flex: 0 0 auto;
      width: 1.48rem;
      height: 0.98rem;
      border-radius: 0.08rem;
      background-image: var(--flag);
      background-position: center;
      background-size: cover;
      box-shadow:
        0 0.14rem 0.24rem rgba(0, 0, 0, 0.34),
        0 0 0 0.05rem rgba(255, 255, 255, 0.34);
    }

    .num {
      text-align: right;
    }

    .center-stage {
      display: grid;
      justify-items: center;
      align-content: center;
      gap: 1.15rem;
      min-width: 0;
      text-align: center;
    }

    .eyebrow {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      color: var(--gold);
      text-shadow: var(--read-shadow);
      font-size: 0.86rem;
      line-height: 1.4;
      text-transform: uppercase;
      font-weight: 850;
      letter-spacing: 0;
    }

    .eyebrow::before,
    .eyebrow::after {
      content: "";
      width: 3.4rem;
      height: 0.12rem;
      border-radius: 999rem;
      background: linear-gradient(90deg, transparent, currentColor);
      opacity: 0.72;
    }

    .eyebrow::after {
      background: linear-gradient(90deg, currentColor, transparent);
    }

    h1 {
      margin: 0;
      max-width: 48rem;
      font-size: 4rem;
      line-height: 0.98;
      font-weight: 900;
      letter-spacing: 0;
      color: #fff8e8;
      text-shadow: var(--read-shadow), 0 0 2rem rgba(255, 209, 102, 0.22);
    }

    .trophy-mark {
      position: relative;
      width: 5.3rem;
      height: 9rem;
      margin: -0.45rem 0 -0.65rem;
      filter:
        drop-shadow(0 0.55rem 0.85rem rgba(0, 0, 0, 0.34))
        drop-shadow(0 0 1.4rem rgba(255, 209, 102, 0.28));
    }

    .trophy-image {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .matchup {
      display: grid;
      grid-template-columns: 8rem minmax(20rem, 39rem) 8rem;
      align-items: center;
      gap: 1rem;
      width: min(58rem, 100%);
    }

    .team-flag-card {
      display: grid;
      align-content: center;
      justify-items: center;
      min-height: 8.4rem;
      border-block: 0.1rem solid rgba(255, 255, 255, 0.16);
      background:
        radial-gradient(circle at 50% 20%, rgba(255, 255, 255, 0.1), transparent 60%),
        rgba(7, 24, 34, 0.42);
      box-shadow: inset 0 0 1.5rem rgba(255, 255, 255, 0.04);
    }

    .big-flag-img {
      width: 5.2rem;
      aspect-ratio: 4 / 3;
      border-radius: 0.18rem;
      background-image: var(--flag);
      background-position: center;
      background-size: cover;
      box-shadow:
        0 0.45rem 0.8rem rgba(0, 0, 0, 0.36),
        0 0 0 0.07rem rgba(255, 255, 255, 0.24),
        0 0 1.6rem rgba(255, 255, 255, 0.12);
    }

    .side-team {
      width: 100%;
      margin-top: 0.55rem;
      padding: 0 0.45rem;
      color: #ffffff;
      text-shadow: var(--read-shadow);
      font-size: 0.78rem;
      line-height: 1.2;
      font-weight: 850;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .match-meta {
      display: grid;
      gap: 0.35rem;
      min-width: 0;
    }

    .versus {
      color: var(--gold);
      font-size: 0.78rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      text-shadow: var(--read-shadow);
    }

    .fixture-title {
      margin: 0;
      overflow: hidden;
      color: #fffdf5;
      font-size: 1.34rem;
      line-height: 1.25;
      font-weight: 900;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-shadow: var(--read-shadow);
    }

    .fixture-subtitle {
      margin: 0;
      overflow: hidden;
      color: #e8f4ff;
      font-size: 0.92rem;
      line-height: 1.4;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-shadow: var(--read-shadow);
    }

    .timer {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr) auto minmax(0, 1fr);
      align-items: stretch;
      justify-content: center;
      gap: 0.75rem;
      width: min(45rem, 100%);
      padding: 0.4rem 0;
    }

    .time-unit {
      position: relative;
      min-width: 0;
      display: grid;
      align-content: center;
      justify-items: center;
      min-height: 9rem;
      border-block: 0.1rem solid rgba(255, 255, 255, 0.16);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.11), rgba(255, 255, 255, 0.03)),
        rgba(7, 24, 34, 0.45);
      box-shadow: inset 0 0 2rem rgba(255, 255, 255, 0.04);
      overflow: hidden;
    }

    .time-unit::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(115deg, transparent 0 28%, rgba(255, 255, 255, 0.18) 36%, transparent 46% 100%);
      transform: translateX(-120%);
      animation: shine 5.8s ease-in-out infinite;
    }

    .digits {
      position: relative;
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum";
      font-size: 5.3rem;
      line-height: 0.92;
      font-weight: 900;
      letter-spacing: 0;
      color: var(--gold);
      text-shadow: var(--read-shadow);
    }

    .label {
      position: relative;
      margin-top: 0.62rem;
      color: #ffffff;
      text-shadow: var(--read-shadow);
      font-size: 0.76rem;
      line-height: 1.3;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .colon {
      align-self: center;
      color: var(--gold);
      font-size: 4.7rem;
      line-height: 1;
      font-weight: 900;
      text-shadow: var(--read-shadow);
      animation: blink 1s steps(2, jump-none) infinite;
    }

    .stage-display {
      width: min(45rem, 100%);
    }

    .stage-display .hidden {
      display: none;
    }

    .center-stage.is-live h1 {
      color: #fff5d6;
    }

    .live-board {
      display: grid;
      gap: 0.55rem;
      justify-items: center;
      padding: 0.2rem 0 0.4rem;
    }

    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.32rem 0.9rem;
      border-radius: 999px;
      background: rgba(255, 77, 95, 0.22);
      border: 0.1rem solid rgba(255, 120, 130, 0.55);
      color: #ffe8eb;
      font-size: 0.78rem;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-shadow: var(--read-shadow);
      animation: livePulse 1.6s ease-in-out infinite;
    }

    .live-badge::before {
      content: "";
      width: 0.55rem;
      height: 0.55rem;
      border-radius: 50%;
      background: #ff4d5f;
      box-shadow: 0 0 0.8rem rgba(255, 77, 95, 0.9);
      animation: blink 1s steps(2, jump-none) infinite;
    }

    .live-score-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
      align-items: stretch;
      gap: 0.75rem;
      width: 100%;
    }

    .live-score-unit .digits {
      font-size: 6.2rem;
    }

    .live-sep {
      font-size: 4.2rem;
      animation: none;
      opacity: 0.82;
    }

    .live-minute {
      font-size: 1.35rem;
      font-weight: 900;
      color: #ffffff;
      letter-spacing: 0.04em;
      text-shadow: var(--read-shadow);
    }

    @keyframes livePulse {
      0%, 100% { box-shadow: 0 0 0 rgba(255, 77, 95, 0); }
      50% { box-shadow: 0 0 1.4rem rgba(255, 77, 95, 0.35); }
    }

    .match-card.is-live {
      border-color: rgba(255, 120, 130, 0.42);
      box-shadow: inset 0 0 1.2rem rgba(255, 77, 95, 0.12);
    }

    .live-timeline {
      width: min(45rem, 100%);
      margin-top: 0.5rem;
      padding: 0.65rem 0.75rem;
      border: 0.1rem solid rgba(255, 255, 255, 0.14);
      border-radius: 0.4rem;
      background: rgba(4, 18, 24, 0.42);
    }

    .live-timeline-head {
      margin-bottom: 0.5rem;
      font-size: 0.72rem;
      font-weight: 900;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #ffffff;
      text-shadow: var(--read-shadow);
    }

    .live-timeline-list {
      display: grid;
      gap: 0.32rem;
      max-height: 10rem;
      overflow-y: auto;
      padding-right: 0.25rem;
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 209, 102, 0.9) rgba(255, 255, 255, 0.10);
    }

    .match-event-section {
      margin-bottom: 0.65rem;
    }

    .match-event-head {
      margin-bottom: 0.45rem;
      font-size: 0.66rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #ffffff;
    }

    .match-event-feed {
      display: grid;
      gap: 0.32rem;
    }

    .match-event-row {
      display: grid;
      grid-template-columns: 1.1rem 2.3rem minmax(0, 1fr) 2.1rem auto;
      align-items: center;
      gap: 0.38rem;
      padding: 0.38rem 0.42rem;
      border-radius: 0.32rem;
      background: rgba(255, 255, 255, 0.06);
      color: #ffffff;
      font-size: 0.72rem;
      font-weight: 700;
      line-height: 1.3;
    }

    .match-event-row.is-assist {
      margin-top: -0.12rem;
      padding-top: 0.18rem;
      padding-bottom: 0.38rem;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 0 0 0.32rem 0.32rem;
    }

    .match-event-row.has-assist-below {
      border-radius: 0.32rem 0.32rem 0 0;
      margin-bottom: 0;
    }

    .match-event-assist-player {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: rgba(255, 255, 255, 0.92);
      font-size: 0.68rem;
    }

    .match-event-minute {
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      color: #ffffff;
      text-align: right;
    }

    .match-event-player {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #ffffff;
    }

    .match-event-team {
      font-size: 0.64rem;
      font-weight: 900;
      color: rgba(255, 255, 255, 0.82);
      text-align: right;
    }

    .match-event-label {
      font-size: 0.62rem;
      font-weight: 800;
      color: rgba(255, 255, 255, 0.88);
      white-space: nowrap;
    }

    .event-icon {
      display: inline-block;
      flex-shrink: 0;
      justify-self: center;
    }

    .event-icon-goal {
      width: 1rem;
      height: 1rem;
      border-radius: 50%;
      background:

    function pad(value, size) {
      return String(value).padStart(size, "0");

    function team(name) {
      const info = teamInfo[name] || { code: "", short: name.slice(0, 3).toUpperCase() };
      return {
        ...info,
        kit: teamKitColors[name] || defaultTeamKit
      };
    }

    function hexToRgb(hex) {
      const raw = String(hex || "").replace("#", "");
      if (raw.length !== 6) {
        return [0, 0, 0];
      }

      return [
        Number.parseInt(raw.slice(0, 2), 16),
        Number.parseInt(raw.slice(2, 4), 16),
        Number.parseInt(raw.slice(4, 6), 16)
      ];
    }

    function kitColorDistance(left, right) {
      const [r1, g1, b1] = hexToRgb(left);
      const [r2, g2, b2] = hexToRgb(right);
      return Math.sqrt((r1 - r2) ** 2 + (g1 - g2) ** 2 + (b1 - b2) ** 2);
    }

    function resolveTeamKit(teamName, opponentName, isHome) {
      const kits = team(teamName).kit;
      const homeKit = kits.home || defaultTeamKit.home;
      const awayKit = kits.away || defaultTeamKit.away;

      if (isHome) {
        return homeKit;
      }

      const opponentHomeKit = team(opponentName).kit.home || defaultTeamKit.home;
      if (kitColorDistance(homeKit.bg, opponentHomeKit.bg) < 110) {
        return awayKit;
      }

      return homeKit;
    }

    function lineupKitStyleVars(homeTeam, awayTeam) {
      const homeKit = resolveTeamKit(homeTeam, awayTeam, true);
      let awayKit = resolveTeamKit(awayTeam, homeTeam, false);

      if (kitColorDistance(homeKit.bg, awayKit.bg) < 110) {
        awayKit = team(awayTeam).kit.away || defaultTeamKit.away;
      }

      if (kitColorDistance(homeKit.bg, awayKit.bg) < 110) {
        awayKit = {
          ...awayKit,
          bg: awayKit.border !== homeKit.bg ? awayKit.border : defaultTeamKit.away.bg,
          text: awayKit.text,
          border: awayKit.border
        };
      }

      return [
        `--home-kit-bg:${homeKit.bg}`,
        `--home-kit-text:${homeKit.text}`,
        `--home-kit-border:${homeKit.border}`,
        `--away-kit-bg:${awayKit.bg}`,
        `--away-kit-text:${awayKit.text}`,
        `--away-kit-border:${awayKit.border}`
      ].join(";");
    }

        day: "2-digit",
        month: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        hour12: false

      const pick = (type) => parts.find((part) => part.type === type)?.value ?? "00";
      return `${pick("day")}/${pick("month")} ${pick("hour")}:${pick("minute")}`;
    }

      return source === "ESPN" ? `ESPN · ${time} · trễ 2p30` : "CỤC BỘ";

    function applySpoilerDelay(match) {
      const key = matchKey(match.home, match.away, match.utc);
      const rawHome = match.homeScore;
      const rawAway = match.awayScore;
      const hasScore = rawHome !== null && rawAway !== null;
      const rawInProgress = match.inProgress;
      const rawCompleted = match.completed;

      const withRaw = (patch) => ({
        ...match,
        rawHomeScore: rawHome,
        rawAwayScore: rawAway,
        rawInProgress,
        rawCompleted,
        ...patch
      });

      if ((!rawInProgress && !rawCompleted) || !hasScore) {
        return withRaw({ isProvisional: false });
      }

      let state = scoreDelayState.get(key);
      if (!state) {
        state = {
          shownHome: null,
          shownAway: null,
          targetHome: null,
          targetAway: null,
          targetSince: 0,
          wasLive: false
        };
        scoreDelayState.set(key, state);
      }

      if (rawInProgress) {
        state.wasLive = true;
      }

      // Trận đã kết thúc trước phiên hiện tại → hiện ngay (lịch sử / bảng điểm)
      if (rawCompleted && !rawInProgress && !state.wasLive) {
        state.shownHome = rawHome;
        state.shownAway = rawAway;
        state.targetHome = rawHome;
        state.targetAway = rawAway;
        return withRaw({
          homeScore: rawHome,
          awayScore: rawAway,
          completed: true,
          inProgress: false,
          statusState: "post",
          isProvisional: false
        });
      }

      const now = Date.now();

      if (state.targetHome !== rawHome || state.targetAway !== rawAway) {
        state.targetHome = rawHome;
        state.targetAway = rawAway;
        state.targetSince = now;
      }

      const delayElapsed = now - state.targetSince >= SPOILER_DELAY_MS;
      const hasShown = state.shownHome !== null && state.shownAway !== null;
      const shownDiffers = hasShown && (state.shownHome !== state.targetHome || state.shownAway !== state.targetAway);

      if (!hasShown && delayElapsed) {
        state.shownHome = state.targetHome;
        state.shownAway = state.targetAway;
      } else if (shownDiffers && delayElapsed) {
        state.shownHome = state.targetHome;
        state.shownAway = state.targetAway;
      }

      if (state.shownHome === null || state.shownAway === null) {
        return withRaw({
          homeScore: null,
          awayScore: null,
          completed: rawCompleted,
          inProgress: rawInProgress,
          statusState: rawInProgress ? "in" : rawCompleted ? "post" : "pre",
          isProvisional: false
        });
      }

      const isProvisional = rawInProgress;

      return withRaw({
        homeScore: state.shownHome,
        awayScore: state.shownAway,
        completed: rawCompleted,
        inProgress: rawInProgress,
        statusState: rawInProgress ? "in" : rawCompleted ? "post" : match.statusState,
        isProvisional
      });
    }

    function mergeRawSchedule() {
      const liveEvents = liveData && Array.isArray(liveData.events) ? liveData.events : [];
      const liveIndex = new Map();

      liveEvents.forEach((event) => {
        if (!event.home || !event.away || !event.utc) {
          return;
        }

        liveIndex.set(matchKey(event.home, event.away, event.utc), event);
      });

      return schedule.map((match) => {
        const event = liveIndex.get(matchKey(match.home, match.away, match.utc));
        if (!event) {
          return {
            ...match,
            completed: false,
            inProgress: false,
            statusState: "pre",
            statusText: "Đã lên lịch",
            homeScore: null,
            awayScore: null,
            espnId: ""
          };
        }

        const staticHome = canonicalName(match.home);
        const liveHome = canonicalName(event.home);
        const homeScore = liveHome === staticHome ? event.homeScore : event.awayScore;
        const awayScore = liveHome === staticHome ? event.awayScore : event.homeScore;
        const statusState = event.statusState || "pre";

        return {
          ...match,
          utc: event.utc || match.utc,
          venue: event.venue || match.venue,
          espnId: String(event.id || ""),
          completed: Boolean(event.completed),
          inProgress: statusState === "in",
          statusState,
          statusText: event.statusText || event.statusDetail || "Đã lên lịch",
          statusDetail: event.statusDetail || "",
          displayClock: event.displayClock || event.statusDetail || "",
          statusClock: Number(event.statusClock) || 0,
          statusPeriod: Number(event.statusPeriod) || 1,
          statusClockUpdatedAt: Number(event.statusClockUpdatedAt) || Date.now(),
          homeScore: numberScore(homeScore),
          awayScore: numberScore(awayScore)
        };
      });
    }

    function mergeLiveSchedule() {

    function statusText(match) {
      if (isLiveMatch(match)) {
        return liveMinuteText(match);
      }

      if (match.completed) {
        return "Kết thúc";
      }

      return formatVietnamTime(match.utc);
    }

    function liveMinuteText(match) {
      if (isLiveMatch(match)) {
        const ticking = formatLiveClock(match);
        if (ticking) {
          return ticking;
        }
      }

      const detail = String(match.statusDetail || "").trim();
      const display = String(match.displayClock || "").trim();
      const text = String(match.statusText || "").trim();
      const generic = new Set(["In Progress", "Đã lên lịch", "Scheduled", "TRỰC TIẾP"]);

      if (display && (/\d/.test(display) || display.includes("'"))) {
        return display;
      }

      if (detail && (/\d/.test(detail) || detail.includes("'"))) {
        return detail;
      }

      if (text && !generic.has(text)) {
        return text;
      }

      return "Đang đá";
    }

    function getLiveClockSeconds(match) {
      if (!isLiveMatch(match)) {
        return null;
      }

      const base = Number(match.statusClock);
      if (!Number.isFinite(base) || base < 0) {
        return null;
      }

      const fetchedAt = Number(match.statusClockUpdatedAt) || Date.now();
      const drift = Math.max(0, Math.floor((Date.now() - fetchedAt) / 1000));
      return base + drift;
    }

    function formatLiveClock(match) {
      const seconds = getLiveClockSeconds(match);
      if (seconds === null) {
        return "";
      }

      const period = Number(match.statusPeriod) || 1;
      const minute = Math.floor(seconds / 60);

      if (period <= 1) {
        if (minute < 45) {
          return `${minute}'`;
        }

        const extra = minute - 45;
        return extra > 0 ? `45+${extra}'` : "45'";
      }

      if (minute < 90) {
        return `${minute}'`;
      }

      const extra = minute - 90;
      return extra > 0 ? `90+${extra}'` : "90'";
    }

    function isLiveMatch(match) {
      return !!(match?.inProgress || match?.rawInProgress);
    }

    function getLiveDisplayScores(match) {
      const home = match.homeScore ?? match.rawHomeScore;

    function timelineEventTypeLabel(typeText, text) {
      const lower = `${typeText} ${text}`.toLowerCase();

      if (lower.includes("goal")) {
        return "goal";
      }

      if (lower.includes("yellow")) {
        return "yellow";
      }

      if (lower.includes("red card") || (lower.includes("red") && lower.includes("card"))) {
        return "red";
      }

      if (lower.includes("substitution") || lower.includes("sub ")) {
        return "sub";
      }

      if (lower.includes("var")) {
        return "var";
      }

      if (lower.includes("penalty")) {
        return "penalty";
      }

      return "other";
    }

    function timelineTypeVi(kind) {
      const labels = {
        goal: "Bàn thắng",
        yellow: "Thẻ vàng",
        red: "Thẻ đỏ",
        sub: "Thay người",
        var: "VAR",
        penalty: "Phạt đền",
        other: "Sự kiện"
      };

      return labels[kind] || "Sự kiện";
    }

    function extractPlayerFromText(text) {
      const body = String(text || "").trim();
      if (!body) {
        return "";
      }

      const parenMatch = body.match(/^([^(]+?)\s*\(/);
      if (parenMatch) {
        return parenMatch[1].trim();
      }

      const afterScore = body.includes(". ") ? body.split(". ").slice(1).join(". ") : body;
      const goalMatch = afterScore.match(/^([^(]+?)\s*\(/);
      if (goalMatch) {
        return goalMatch[1].trim();
      }

      return "";
    }

    function extractAssistFromText(text) {
      const body = String(text || "");
      const assistedMatch = body.match(/Assisted by\s+([^.]+)/i);
      if (assistedMatch) {
        return assistedMatch[1].trim();
      }

      return "";
    }

    function normalizeEventTeam(name) {
      return canonicalName(liveNameAliases[name] || name || "");
    }

    function parseTimelineFromSummary(data) {
      const events = [];
      const pushEvent = (minute, typeText, text, meta = {}) => {
        const body = String(text || typeText || "").trim();
        if (!body) {
          return;
        }

        const kind = timelineEventTypeLabel(typeText, body);
        const player = meta.player || extractPlayerFromText(body);
        events.push({
          minute: minute || "—",
          clockValue: Number.isFinite(meta.clockValue) ? meta.clockValue : minuteSortKey(minute),
          kind,
          label: timelineTypeVi(kind),
          text: body,
          player,
          teamName: meta.teamName || "",
          athleteId: meta.athleteId || "",
          assistPlayer: meta.assistPlayer || "",
          assistId: meta.assistId || "",
          subInId: meta.subInId || "",
          subOutId: meta.subOutId || ""
        });
      };

      const keyEvents = Array.isArray(data.keyEvents) ? data.keyEvents : [];
      keyEvents.forEach((item) => {
        const minute = item.clock?.displayValue || item.clock?.value || item.period?.displayValue || "";
        const typeText = item.type?.text || item.type?.description || "";
        const text = item.text || item.shortText || item.description || "";
        const player = item.participants?.[0]?.athlete?.displayName
          || item.participants?.[0]?.athlete?.shortName
          || "";
        const participants = Array.isArray(item.participants) ? item.participants : [];
        const kindPreview = timelineEventTypeLabel(typeText, text);
        const meta = {
          player,
          teamName: item.team?.displayName || "",
          clockValue: Number(item.clock?.value),
          athleteId: "",
          subInId: "",
          subOutId: ""
        };

        if (kindPreview === "sub" && participants.length >= 2) {
          meta.subInId = String(participants[0]?.athlete?.id || "");
          meta.subOutId = String(participants[1]?.athlete?.id || "");
          meta.athleteId = meta.subInId;
        } else if (kindPreview === "goal") {
          meta.athleteId = String(participants[0]?.athlete?.id || "");
          if (participants.length >= 2) {
            meta.assistPlayer = participants[1]?.athlete?.displayName
              || participants[1]?.athlete?.shortName
              || "";
            meta.assistId = String(participants[1]?.athlete?.id || "");
          }

          if (!meta.assistPlayer) {
            meta.assistPlayer = extractAssistFromText(text);
          }
        } else {
          meta.athleteId = String(participants[0]?.athlete?.id || "");
        }

        pushEvent(minute, typeText, text, meta);
      });

      if (events.length === 0 && Array.isArray(data.commentary)) {
        data.commentary.forEach((item) => {
          const minute = item.time?.displayValue || item.clock?.displayValue || "";
          const typeText = item.type?.text || "";
          const text = item.text || item.shortText || "";
          pushEvent(minute, typeText, text);
        });
      }

      const headerCompetition = data.header?.competitions?.[0];
      const scoringPlays = headerCompetition?.scoringPlays || data.scoringPlays;
      if (events.length === 0 && Array.isArray(scoringPlays)) {
        scoringPlays.forEach((item) => {
          const minute = item.clock?.displayValue || "";
          const text = item.text || item.shortDescription || item.description || "Bàn thắng";
          pushEvent(minute, "Goal", text);
        });
      }

      return events;
    }

    const matchStatDefs = [
      { key: "totalShots", label: "Sút bóng", better: "higher" },
      { key: "shotsOnTarget", label: "Sút trúng đích", better: "higher" },
      { key: "possessionPct", label: "Kiểm soát bóng", better: "higher", percent: true },
      { key: "totalPasses", label: "Đường chuyền", better: "higher" },
      { key: "passPct", label: "Chính xác chuyền", better: "higher", ratio: true },
      { key: "foulsCommitted", label: "Phạm lỗi", better: "lower" },
      { key: "yellowCards", label: "Thẻ vàng", better: "lower" },
      { key: "redCards", label: "Thẻ đỏ", better: "lower" },
      { key: "offsides", label: "Việt vị", better: "lower" },
      { key: "wonCorners", label: "Phạt góc", better: "higher" }
    ];

    function getTeamStatValue(teamBlock, key) {
      const stat = teamBlock?.statistics?.find((item) => item.name === key);
      if (!stat) {
        return null;
      }

      const raw = Number(stat.displayValue);
      return Number.isFinite(raw) ? raw : null;
    }

    function formatMatchStatValue(value, def) {
      if (value === null) {
        return "—";
      }

      if (def.ratio) {
        return `${Math.round(value * 100)}%`;
      }

      if (def.percent) {
        return `${Math.round(value)}%`;
      }

      return String(Math.round(value * 10) / 10);
    }

    function statBestSides(homeRaw, awayRaw, better) {
      if (homeRaw === null || awayRaw === null || homeRaw === awayRaw) {
        return ["", ""];
      }

      if (better === "lower") {
        return homeRaw < awayRaw ? ["is-best", ""] : ["", "is-best"];
      }

      return homeRaw > awayRaw ? ["is-best", ""] : ["", "is-best"];
    }

    function parseStatsFromSummary(data) {
      const teams = data.boxscore?.teams;
      if (!Array.isArray(teams) || teams.length < 2) {
        return null;
      }

      const competitors = data.header?.competitions?.[0]?.competitors || [];
      const homeId = competitors.find((item) => item.homeAway === "home")?.team?.id;
      const awayId = competitors.find((item) => item.homeAway === "away")?.team?.id;
      const homeTeam = teams.find((item) => String(item.team?.id) === String(homeId)) || teams[0];
      const awayTeam = teams.find((item) => String(item.team?.id) === String(awayId)) || teams[1];

      const rows = matchStatDefs.map((def) => {
        const homeRaw = getTeamStatValue(homeTeam, def.key);
        const awayRaw = getTeamStatValue(awayTeam, def.key);
        const [homeBest, awayBest] = statBestSides(homeRaw, awayRaw, def.better);

        return {
          label: def.label,
          home: formatMatchStatValue(homeRaw, def),
          away: formatMatchStatValue(awayRaw, def),
          homeBest,
          awayBest
        };
      });

      return {
        homeShort: homeTeam.team?.abbreviation || "",
        awayShort: awayTeam.team?.abbreviation || "",
        rows
      };
    }

    function formationRows(formation) {
      const rows = String(formation || "4-4-2")
        .split("-")
        .map((part) => Number.parseInt(part, 10))
        .filter((count) => Number.isFinite(count) && count > 0);

      return rows.length ? rows : [4, 4, 2];
    }

    function getFormationRowY(rowIdx, rowCount, isHome) {
      const homeRows = {
        1: [30],
        2: [18, 34],
        3: [14, 26, 38],
        4: [12, 21, 30, 39],
        5: [11, 18, 25, 32, 39]
      };
      const rows = homeRows[rowCount] || homeRows[4];
      const yHome = rows[Math.min(rowIdx, rows.length - 1)] || 30;
      return isHome ? yHome : 100 - yHome;
    }

    function getFormationCoords(formationPlace, formation, isHome) {
      if (!formationPlace) {
        return { x: 50, y: isHome ? 28 : 72, rowIdx: 0 };
      }

      if (formationPlace === 1) {
        return { x: 50, y: isHome ? 5 : 95, rowIdx: -1 };
      }

      const rows = formationRows(formation);
      let slot = formationPlace - 2;
      let rowIdx = 0;
      let colIdx = 0;

      for (let index = 0; index < rows.length; index += 1) {
        if (slot < rows[index]) {
          rowIdx = index;
          colIdx = slot;
          break;
        }

        slot -= rows[index];
      }

      const countInRow = rows[rowIdx] || 1;
      const edge = countInRow >= 4 ? 8 : countInRow === 3 ? 12 : 18;
      const span = 100 - edge * 2;
      const x = edge + ((colIdx + 1) / (countInRow + 1)) * span;
      const y = getFormationRowY(rowIdx, rows.length, isHome);

      return { x, y, rowIdx };
    }

    function parseRosterPlayer(player) {
      const athlete = player.athlete || {};
      const jerseyImages = Array.isArray(athlete.jerseyImages) ? athlete.jerseyImages : [];
      const photo = jerseyImages.find((item) => item.rel?.includes("dark"))?.href
        || jerseyImages.find((item) => item.rel?.includes("default"))?.href
        || athlete.headshot?.href
        || "";

      return {
        id: String(athlete.id || ""),
        jersey: player.jersey || "",
        name: athlete.displayName || athlete.shortName || "—",
        position: player.position?.displayName || player.position?.name || "",
        positionAbbr: player.position?.abbreviation || "",
        formationPlace: Number(player.formationPlace) || 0,
        starter: !!player.starter,
        subbedIn: !!player.subbedIn,
        subbedOut: !!player.subbedOut,
        photo
      };
    }

    function parseTeamRoster(rosterBlock) {
      const roster = rosterBlock?.roster || [];
      return {
        formation: rosterBlock?.formation || "",
        starters: roster
          .filter((player) => player.starter)
          .map(parseRosterPlayer)
          .sort((a, b) => (a.formationPlace || 99) - (b.formationPlace || 99)),
        subs: roster
          .filter((player) => !player.starter)
          .map(parseRosterPlayer)
          .sort((a, b) => Number(a.jersey) - Number(b.jersey))
      };
    }

    function positionLabelVi(positionName, abbr) {
      const key = String(abbr || positionName || "").toUpperCase();
      const labels = {
        G: "Thủ môn",
        GK: "Thủ môn",
        CD: "Hậu vệ",
        CB: "Hậu vệ",
        LB: "Hậu vệ",
        RB: "Hậu vệ",
        LM: "Hậu vệ",
        RM: "Hậu vệ",
        CM: "Tiền vệ",
        DM: "Tiền vệ",
        AM: "Tiền vệ",
        F: "Tiền đạo",
        CF: "Tiền đạo",
        ST: "Tiền đạo"
      };

      for (const token of Object.keys(labels)) {
        if (key.includes(token)) {
          return labels[token];
        }
      }

      return positionName || "Cầu thủ";
    }

    function lineupJerseyContent(player) {
      const number = player.jersey || "?";
      return `<div class="lineup-player-photo-fallback">${number}</div>`;
    }

    function buildPlayerEventsMap(events) {
      const byId = new Map();
      const ensure = (id) => {
        if (!id) {
          return null;
        }

        if (!byId.has(id)) {
          byId.set(id, { goals: 0, assists: 0, yellow: 0, red: 0, subInMin: null, subOutMin: null });
        }

        return byId.get(id);
      };

      (events || []).forEach((item) => {
        if (item.kind === "goal") {
          const bucket = ensure(item.athleteId);
          if (bucket) {
            bucket.goals += 1;
          }

          const assistBucket = ensure(item.assistId);
          if (assistBucket) {
            assistBucket.assists += 1;
          }
        }

        if (item.kind === "yellow") {
          const bucket = ensure(item.athleteId);
          if (bucket) {
            bucket.yellow += 1;
          }
        }

        if (item.kind === "red") {
          const bucket = ensure(item.athleteId);
          if (bucket) {
            bucket.red += 1;
          }
        }

        if (item.kind === "sub") {
          const inBucket = ensure(item.subInId);
          if (inBucket) {
            inBucket.subInMin = item.minute;
          }

          const outBucket = ensure(item.subOutId);
          if (outBucket) {
            outBucket.subOutMin = item.minute;
          }
        }
      });

      return byId;
    }

    function parseLineupsFromSummary(data) {
      const rosters = Array.isArray(data.rosters) ? data.rosters : [];
      if (!rosters.length) {
        return null;
      }

      const competitors = data.header?.competitions?.[0]?.competitors || [];
      const homeId = competitors.find((item) => item.homeAway === "home")?.team?.id;
      const awayId = competitors.find((item) => item.homeAway === "away")?.team?.id;
      const homeRoster = rosters.find((item) => String(item.team?.id) === String(homeId)) || rosters[0];
      const awayRoster = rosters.find((item) => String(item.team?.id) === String(awayId)) || rosters[1];

      return {
        home: parseTeamRoster(homeRoster),
        away: parseTeamRoster(awayRoster)
      };
    }

    function parseMatchSummary(data) {
      return {
        events: parseTimelineFromSummary(data),
        stats: parseStatsFromSummary(data),
        lineups: parseLineupsFromSummary(data)
      };
    }

    async function fetchMatchSummary(espnId) {
      if (!espnId) {
        return null;
      }

      const cached = summaryCache.get(espnId);
      const now = Date.now();
      if (cached && now - cached.fetchedAt < 12000) {
        return cached.data;
      }

      try {
        const response = await fetch(
          `https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/summary?event=${espnId}`,
          { cache: "no-store" }
        );

        if (!response.ok) {
          throw new Error(`ESPN summary ${response.status}`);
        }

        const data = parseMatchSummary(await response.json());
        summaryCache.set(espnId, { data, fetchedAt: now });
        return data;
      } catch (error) {
        return cached?.data || null;
      }
    }

    async function fetchMatchTimeline(espnId) {
      const summary = await fetchMatchSummary(espnId);
      return summary?.events || [];
    }

    function renderTimelineList(container, events) {
      if (!container) {
        return;
      }

      if (!events.length) {
        container.innerHTML = '<div class="timeline-empty">Chưa có diễn biến chi tiết.</div>';
        return;
      }

      container.innerHTML = events.map((item) => {
        return `
          <div class="timeline-item timeline-${item.kind}">
            <div class="timeline-minute">${item.minute}</div>
            <div class="timeline-body">
              <div class="timeline-label">${item.label}</div>
              <div class="timeline-text">${item.text}</div>
            </div>
          </div>
        `;
      }).join("");
    }

    function getKeyEvents(events) {
      return (events || []).filter((item) => item.kind === "goal" || item.kind === "yellow" || item.kind === "red");
    }

    function minuteSortKey(minute) {
      const raw = String(minute || "0").replace(/'/g, "");
      const extraMatch = raw.match(/\+(\d+)/);
      const base = Number.parseInt(raw.replace(/\+\d+/, ""), 10) || 0;
      const extra = extraMatch ? Number.parseInt(extraMatch[1], 10) : 0;
      return base * 100 + extra;
    }

    function eventIconClass(kind) {
      if (kind === "goal") {
        return "event-icon-goal";
      }

      if (kind === "yellow") {
        return "event-icon-yellow";
      }

      return "event-icon-red";
    }

    function eventLabel(kind) {
      if (kind === "goal") {
        return "Ghi bàn";
      }

      if (kind === "yellow") {
        return "Thẻ vàng";
      }

      return "Thẻ đỏ";
    }

    function resolveEventTeamShort(item, match) {
      const text = String(item.text || "");
      const teamName = item.teamName
        || (text.includes(`(${match.home})`) ? match.home : "")
        || (text.includes(`(${match.away})`) ? match.away : "");
      return teamName ? team(teamName).short : "—";
    }

    function renderMatchEventFeed(events, match, options = {}) {
      const { showHead = true } = options;
      const keyEvents = getKeyEvents(events)
        .slice()
        .sort((a, b) => {
          const aClock = Number.isFinite(a.clockValue) ? a.clockValue : minuteSortKey(a.minute);
          const bClock = Number.isFinite(b.clockValue) ? b.clockValue : minuteSortKey(b.minute);
          return aClock - bClock;
        });

      if (!keyEvents.length) {
        return '<div class="timeline-empty">Chưa có bàn thắng hoặc thẻ.</div>';
      }

      const rows = keyEvents.flatMap((item) => {
        const player = item.player || extractPlayerFromText(item.text) || "—";
        const mainRow = `
          <div class="match-event-row${item.kind === "goal" && item.assistPlayer ? " has-assist-below" : ""}">
            <span class="event-icon ${eventIconClass(item.kind)}" aria-hidden="true"></span>
            <span class="match-event-minute">${item.minute || "—"}</span>
            <span class="match-event-player">${player}</span>
            <span class="match-event-team">${resolveEventTeamShort(item, match)}</span>
            <span class="match-event-label">${eventLabel(item.kind)}</span>
          </div>
        `;

        if (item.kind !== "goal" || !item.assistPlayer) {
          return [mainRow];
        }

        const assistRow = `
          <div class="match-event-row is-assist">
            <span class="event-icon event-icon-assist" aria-hidden="true"></span>
            <span class="match-event-minute"></span>
            <span class="match-event-assist-player">${item.assistPlayer}</span>
            <span class="match-event-team">${resolveEventTeamShort(item, match)}</span>
            <span class="match-event-label">Kiến tạo</span>
          </div>
        `;

        return [mainRow, assistRow];
      }).join("");

      const head = showHead ? '<div class="match-event-head">Sự kiện trận đấu</div>' : "";

      return `
        <div class="match-event-section">
          ${head}
          <div class="match-event-feed">${rows}</div>
        </div>
      `;
    }

    async function loadMatchTimelineForLive(match) {
      if (!isLiveMatch(match) || !liveTimelineListEl) {
        return;
      }

      const summary = await fetchMatchSummary(match.espnId);
      if (liveTimelineListEl) {
        liveTimelineListEl.innerHTML = renderMatchEventFeed(summary?.events || [], match, { showHead: false });
      }

      const scores = getLiveDisplayScores(match);
      if (liveHomeScoreEl && liveAwayScoreEl) {
        liveHomeScoreEl.textContent = scores.home;
        liveAwayScoreEl.textContent = scores.away;
      }
    }

    function renderStatsPanel(stats, match, events) {
      const keyEventsHtml = renderMatchEventFeed(events || [], match);
      const homeShort = team(match.home).short;
      const awayShort = team(match.away).short;

      if (!stats?.rows?.length) {

        return `

            <div class="detail-stat-label">${row.label}</div>
            <div class="detail-stat-value ${row.awayBest}">${row.away}</div>
          </div>
        `;

      return `
        ${keyEventsHtml}
        <div class="detail-stats-head">Thống kê đội · ${homeShort} – ${awayShort}</div>
        <div class="detail-stats-table">${rows}</div>

    function renderLineupTeamBar(teamName, formation, isHome) {
      const sideClass = isHome ? "is-home" : "is-away";
      return `
        <div class="lineup-team-bar ${sideClass}">
          <div class="lineup-team-meta">

            <span class="lineup-team-name">${teamName}</span>

          ${formation ? `<span class="lineup-formation">${formation}</span>` : ""}

    function renderBenchColHeader(teamName) {

    function renderPitchPlayer(player, isHome, formation, eventsMap) {
      const coords = getFormationCoords(player.formationPlace, formation, isHome);
      const sideClass = isHome ? "is-home" : "is-away";
      const events = eventsMap.get(player.id) || { goals: 0, assists: 0, yellow: 0, red: 0, subInMin: null, subOutMin: null };
      const icons = [];

      for (let i = 0; i < events.goals; i += 1) {
        icons.push('<span class="event-icon event-icon-goal" aria-hidden="true"></span>');
      }

      for (let i = 0; i < events.assists; i += 1) {
        icons.push('<span class="event-icon event-icon-assist" aria-hidden="true"></span>');
      }

      if (events.yellow) {
        icons.push('<span class="event-icon event-icon-yellow" aria-hidden="true"></span>');
      }

      if (events.red) {
        icons.push('<span class="event-icon event-icon-red" aria-hidden="true"></span>');
      }

      if (player.subbedOut || events.subOutMin) {
        icons.push('<span class="lineup-sub-icon lineup-sub-out" aria-hidden="true">↓</span>');
      }

      return `
        <div class="lineup-player-dot ${sideClass}" style="left:${coords.x}%;top:${coords.y}%;">
          <div class="lineup-player-photo">
            ${lineupJerseyContent(player)}
            ${icons.length ? `<div class="lineup-player-icons">${icons.join("")}</div>` : ""}

          <div class="lineup-player-label">
            <span class="lineup-player-name">${player.name}</span>
          </div>
        </div>

    function renderBenchPlayer(player, eventsMap) {
      const events = eventsMap.get(player.id) || { goals: 0, assists: 0, yellow: 0, red: 0, subInMin: null, subOutMin: null };
      const icons = [];

      for (let i = 0; i < events.goals; i += 1) {
        icons.push('<span class="event-icon event-icon-goal" aria-hidden="true"></span>');
      }

      for (let i = 0; i < events.assists; i += 1) {
        icons.push('<span class="event-icon event-icon-assist" aria-hidden="true"></span>');
      }

      if (events.yellow) {
        icons.push('<span class="event-icon event-icon-yellow" aria-hidden="true"></span>');
      }

      if (events.red) {
        icons.push('<span class="event-icon event-icon-red" aria-hidden="true"></span>');
      }

      if (player.subbedIn || events.subInMin) {
        icons.push('<span class="lineup-sub-icon lineup-sub-in" aria-hidden="true">↑</span>');

    function renderLineupsPanel(lineups, match, events) {
      const homeStarters = lineups?.home?.starters || [];
      const awayStarters = lineups?.away?.starters || [];

      return `

    async function renderMatchDetail(matchKey, tab = detailTab) {

    function getStandingsScores(match) {
      if (match.homeScore !== null && match.awayScore !== null) {
        return { home: match.homeScore, away: match.awayScore };
      }

      if (match.rawInProgress && match.rawHomeScore !== null && match.rawAwayScore !== null) {
        return { home: match.rawHomeScore, away: match.rawAwayScore };
      }

      return null;
    }

    function buildStandings() {
      const table = {};

      groups.forEach((group) => {
        table[group.name] = {};
        group.teams.forEach((teamName) => {
          table[group.name][teamName] = {
            name: teamName,
            played: 0,
            wins: 0,
            draws: 0,
            losses: 0,
            gf: 0,
            ga: 0,
            gd: 0,
            points: 0
          };
        });
      });

      mergeLiveSchedule().forEach((match) => {
        const scores = getStandingsScores(match);
        if (!scores) {
          return;
        }

        const groupTable = table[match.group];
        if (!groupTable || !groupTable[match.home] || !groupTable[match.away]) {
          return;
        }

        const home = groupTable[match.home];
        const away = groupTable[match.away];
        const homeScore = scores.home;
        const awayScore = scores.away;
        const isLive = match.isProvisional || match.rawInProgress;
        const isFinal = (match.completed || match.rawCompleted) && !match.rawInProgress
          && match.homeScore !== null && match.awayScore !== null;

        if (isFinal) {
          home.played += 1;
          away.played += 1;
          home.gf += homeScore;
          home.ga += awayScore;
          away.gf += awayScore;
          away.ga += homeScore;

          if (homeScore > awayScore) {
            home.wins += 1;
            away.losses += 1;
            home.points += 3;
          } else if (homeScore < awayScore) {
            away.wins += 1;
            home.losses += 1;
            away.points += 3;
          } else {
            home.draws += 1;
            away.draws += 1;
            home.points += 1;
            away.points += 1;
          }
        } else if (isLive) {
          home.gf += homeScore;
          home.ga += awayScore;
          away.gf += awayScore;
          away.ga += homeScore;

          if (homeScore > awayScore) {
            home.points += 3;
          } else if (homeScore < awayScore) {
            away.points += 3;
          } else {
            home.points += 1;
            away.points += 1;
          }
        }
      });

      Object.values(table).forEach((groupTable) => {
        Object.values(groupTable).forEach((row) => {
          row.gd = row.gf - row.ga;
        });
      });

      return table;
    }

    function sortedGroupRows(group, standings) {
      return group.teams
        .map((teamName, index) => ({ ...standings[group.name][teamName], index }))
        .sort((a, b) => (
          b.points - a.points ||
          b.gd - a.gd ||
          b.gf - a.gf ||
          a.index - b.index
        ));
    }

    function formatGoalDiff(value) {
      return value > 0 ? `+${value}` : String(value);
    }

    const espnScoreboardUrl = "https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=20260611-20260628&limit=200";

    const espnAbbreviationAliases = {
      BIH: "Bosnia and Herzegovina",
      CPV: "Cabo Verde",
      COD: "DR Congo",
      CUW: "Curacao",
      KOR: "Korea Republic",
      TUR: "Turkey"
    };

    function normalizeEspnTeam(name, abbreviation) {
      return espnAbbreviationAliases[abbreviation] || liveNameAliases[name] || name;
    }

    function transformEspnScoreboard(data) {
      const events = Array.isArray(data.events) ? data.events : [];

      return {
        source: "ESPN",
        sourceUrl: espnScoreboardUrl,
        updatedAt: new Date().toISOString(),
        events: events.map((event) => {
          const competition = event.competitions && event.competitions[0];
          const competitors = competition && Array.isArray(competition.competitors)
            ? competition.competitors
            : [];
          const home = competitors.find((competitor) => competitor.homeAway === "home");
          const away = competitors.find((competitor) => competitor.homeAway === "away");

          if (!home || !away) {
            return null;
          }

          return {
            id: String(event.id || ""),
            name: String(event.name || ""),
            shortName: String(event.shortName || ""),
            utc: String(event.date || ""),
            statusState: String(event.status?.type?.state || "pre"),
            statusName: String(event.status?.type?.name || ""),
            statusText: String(event.status?.type?.description || "Đã lên lịch"),
            statusDetail: String(event.status?.type?.detail || ""),
            displayClock: String(event.status?.displayClock || event.status?.type?.detail || ""),
            statusClock: Number(event.status?.clock) || 0,
            statusPeriod: Number(event.status?.period) || 1,
            statusClockUpdatedAt: Date.now(),
            completed: Boolean(event.status?.type?.completed),
            venue: String(competition?.venue?.fullName || ""),
            home: normalizeEspnTeam(home.team?.displayName || "", home.team?.abbreviation || ""),
            away: normalizeEspnTeam(away.team?.displayName || "", away.team?.abbreviation || ""),
            homeScore: readCompetitorScore(home),
            awayScore: readCompetitorScore(away)
          };
        }).filter(Boolean)
      };
    }

    function loadBundledLiveData() {
      const script = document.createElement("script");
      const previous = document.getElementById("liveDataScript");

      if (previous) {
        previous.remove();
      }

      script.id = "liveDataScript";
      script.src = `worldcup-live-data.js?ts=${Date.now()}`;
      script.onload = () => {
        if (window.WORLDCUP_LIVE_DATA && Array.isArray(window.WORLDCUP_LIVE_DATA.events)) {
          liveData = window.WORLDCUP_LIVE_DATA;
          if (dataStatusEl) {
            dataStatusEl.textContent = formatDataStatus("local");
          }
          refreshLiveViews();
          scheduleLiveRefresh();
        }
      };
      script.onerror = () => {
        if (dataStatusEl) {
          dataStatusEl.textContent = formatDataStatus("local");
        }
        scheduleLiveRefresh();
      };
      document.body.appendChild(script);
    }

    async function loadLiveData() {
      try {
        const response = await fetch(espnScoreboardUrl, { cache: "no-store" });

        if (!response.ok) {
          throw new Error(`ESPN returned ${response.status}`);
        }

        liveData = transformEspnScoreboard(await response.json());

        if (dataStatusEl) {
          dataStatusEl.textContent = formatDataStatus("ESPN");
        }

        lastLiveScoresKey = getLiveScoresKey();
        refreshLiveViews();
        scheduleLiveRefresh();
      } catch (error) {
        loadBundledLiveData();
        scheduleLiveRefresh();
      }
    }

    const standingsGroupsPerPage = 4;
    let standingsPage = 0;

    function renderStandings() {
      const pageCount = Math.ceil(groups.length / standingsGroupsPerPage);
      const start = standingsPage * standingsGroupsPerPage;
      const visibleGroups = groups.slice(start, start + standingsGroupsPerPage);
      const standings = buildStandings();
      const liveTeams = getLiveTeamsInStandings();
      const provisionalTeams = getProvisionalPointTeams();
      const firstGroup = visibleGroups[0].name.replace("Group ", "");
      const lastGroup = visibleGroups[visibleGroups.length - 1].name.replace("Group ", "");

      if (standingsKickerEl) {
        standingsKickerEl.textContent = `BẢNG ${firstGroup}–${lastGroup}`;
      }

      document.querySelectorAll(".group-button").forEach((button) => {

      });

      standingsViewEl.innerHTML = visibleGroups.map((group) => {
        const groupRows = sortedGroupRows(group, standings);
        const played = groupRows.reduce((sum, row) => sum + row.played, 0);
        const rows = groupRows.map((row) => {
          const liveBadge = liveTeams.has(row.name) ? '<span class="standings-provisional">LIVE</span>' : "";
          const provisionalClass = provisionalTeams.has(row.name) ? " is-provisional" : "";
          return `

                <span class="flag-img" style="${flagStyle(row.name)}" aria-hidden="true"></span>
                <span class="team-name">${row.name}${liveBadge}</span>

              <div class="num">${row.wins}</div>
              <div class="num">${row.draws}</div>
              <div class="num">${row.losses}</div>
              <div class="num${provisionalClass}">${formatGoalDiff(row.gd)}</div>
              <div class="num${provisionalClass}">${row.points}</div>
            </div>
          `;
        }).join("");

        return `
          <section class="group-card is-clickable" data-group="${group.name}" tabindex="0" role="button" aria-label="Xem lịch sử ${formatGroupName(group.name)}">
            <div class="group-head">
              <div class="group-name">${formatGroupName(group.name)}</div>
              <div class="group-status">${played ? `${played / 2}/6 trận` : "Chưa đấu"}</div>
            </div>
            <div class="table-row header">
              <div>ĐỘI</div>
              <div class="num" title="Thắng">W</div>
              <div class="num" title="Hòa">D</div>
              <div class="num" title="Bại">L</div>
              <div class="num">HS</div>
              <div class="num">ĐIỂM</div>
            </div>
            ${rows}
          </section>
        `;
      }).join("");
    }

    function setStandingsPage(page) {
      const pageCount = Math.ceil(groups.length / standingsGroupsPerPage);
      standingsPage = Math.max(0, Math.min(pageCount - 1, page));
      showStandingsView();
    }

    function isUpcomingOrLiveMatch(match, now) {
      return !match.completed && (match.inProgress || match.rawInProgress || Date.parse(match.utc) > now);
    }

    function matchPriority(match) {
      if (match.inProgress || match.rawInProgress) {
        return 0;
      }

      return 1;
    }

    function nextMatches(now) {
      return mergeLiveSchedule()
        .filter((match) => isUpcomingOrLiveMatch(match, now))
        .sort((a, b) => {
          const priorityDiff = matchPriority(a) - matchPriority(b);
          if (priorityDiff !== 0) {
            return priorityDiff;
          }

          return Date.parse(a.utc) - Date.parse(b.utc);
        })
        .slice(0, 5);
    }

    function getCenterMatch(matches) {
      if (centerMatchKey) {
        const selected = matches.find((match) => matchKey(match.home, match.away, match.utc) === centerMatchKey);
        if (selected) {
          return selected;
        }

        centerMatchKey = "";
      }

      return matches.find((match) => match.inProgress || match.rawInProgress) || matches[0] || null;
    }

    function renderFixtures(matches, activeKey) {
      if (matches.length === 0) {
        fixturesEl.innerHTML = '<div class="empty-state">Vòng bảng đã kết thúc.</div>';
        return;
      }

      fixturesEl.innerHTML = matches.map((match) => {
        const home = team(match.home);
        const away = team(match.away);
        const key = matchKey(match.home, match.away, match.utc);
        const isSelected = key === activeKey;
        return `
          <article class="match-card${isLiveMatch(match) ? " is-live" : ""}${isSelected ? " is-selected" : ""}" data-match-key="${key}" role="button" tabindex="0" aria-pressed="${isSelected}">
            <div class="match-row">
              <div class="match-team">
                <span class="flag-img" style="${flagStyle(match.home)}" aria-hidden="true"></span>
                <span class="match-team-name">${match.home}</span>
              </div>
              <div class="match-v">${scoreText(match)}</div>
              <div class="match-team away">
                <span class="match-team-name">${match.away}</span>
                <span class="flag-img" style="${flagStyle(match.away)}" aria-hidden="true"></span>
              </div>
            </div>
            <div class="match-time">
              <span>${formatGroupName(match.group)}</span>
              <span>${statusText(match)}</span>
            </div>
            <div class="match-time">
              <span>${match.venue}</span>
              <span>${home.short} - ${away.short}</span>
            </div>
          </article>
        `;
      }).join("");
    }

    function updateNextMatch(match) {
      if (!match) {
        homeFlagEl.style.removeProperty("--flag");
        awayFlagEl.style.removeProperty("--flag");
        homeNameEl.textContent = "World Cup";
        awayNameEl.textContent = "2026";
        matchGroupEl.textContent = "Hết giờ";
        matchTitleEl.textContent = "Vòng bảng đã kết thúc";
        matchTimeEl.textContent = "Không còn trận sắp diễn ra";
        setStageMode(false);
        return;
      }

      const home = team(match.home);
      const away = team(match.away);
      homeFlagEl.style.setProperty("--flag", `url('${flagPath(match.home)}')`);
      awayFlagEl.style.setProperty("--flag", `url('${flagPath(match.away)}')`);
      homeNameEl.textContent = match.home;
      awayNameEl.textContent = match.away;
      matchGroupEl.textContent = isLiveMatch(match)
        ? `${formatGroupName(match.group)} · TRỰC TIẾP`
        : formatGroupName(match.group);
      matchTitleEl.textContent = isLiveMatch(match)
        ? `${match.home} vs ${match.away}`
        : `${match.home} ${scoreText(match)} ${match.away}`;
      matchTimeEl.textContent = isLiveMatch(match)
        ? `${liveMinuteText(match)} · ${match.venue}`
        : `Giờ VN ${formatVietnamTime(match.utc)} · ${match.venue}`;
    }

    function updateCountdown() {
      const now = Date.now();
      const matches = nextMatches(now);
      const next = getCenterMatch(matches);
      const activeKey = next ? matchKey(next.home, next.away, next.utc) : "";

      renderFixtures(matches, activeKey);
      updateNextMatch(next);
      updateLiveBoard(next);

      const scoresKey = getLiveScoresKey();
      if (scoresKey !== lastLiveScoresKey) {
        lastLiveScoresKey = scoresKey;
        refreshLiveViews({ skipCountdown: true });
      }

      if (next && isLiveMatch(next)) {
        localClockEl.textContent = `Giờ VN · ${new Intl.DateTimeFormat("vi-VN", {
          timeZone: TIMEZONE_VN,
          weekday: "short",
          day: "2-digit",
          month: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
          hour12: false
        }).format(new Date())}`;
        return;
      }

      const target = next && Date.parse(next.utc) > now ? Date.parse(next.utc) : now;
      const remaining = Math.max(0, target - now);
      const totalSeconds = Math.floor(remaining / 1000);
      const hours = Math.floor(totalSeconds / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;

      hoursEl.textContent = pad(hours, 2);
      minutesEl.textContent = pad(minutes, 2);
      secondsEl.textContent = pad(seconds, 2);

      localClockEl.textContent = `Giờ VN · ${new Intl.DateTimeFormat("vi-VN", {
        timeZone: TIMEZONE_VN,
        weekday: "short",
        day: "2-digit",
        month: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: false
      }).format(new Date())}`;
    }

    renderStandings();
    loadLiveData();

    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") {
        loadLiveData();
      }
    });
    groupControlsEl.addEventListener("click", (event) => {
      const button = event.target.closest(".group-button");
      if (!button) {
        return;
      }

      setStandingsPage(Number(button.dataset.page));
    });

    standingsScrollEl.addEventListener("click", (event) => {
      const groupCard = event.target.closest(".group-card[data-group]");
      if (groupCard && standingsOverlay === "standings") {
        openGroupHistory(groupCard.dataset.group);
        return;
      }

      const historyRow = event.target.closest(".history-match-row[data-match-key]");
      if (historyRow) {
        openMatchDetail(historyRow.dataset.matchKey);
        return;
      }

      const backStandings = event.target.closest('[data-action="back-standings"]');
      if (backStandings) {
        showStandingsView();
        return;
      }

      const backHistory = event.target.closest('[data-action="back-history"]');
      if (backHistory && selectedGroupName) {
        openGroupHistory(selectedGroupName);
        return;
      }

      const detailTabButton = event.target.closest("[data-detail-tab]");
      if (detailTabButton && standingsOverlay === "detail") {
        switchDetailTab(detailTabButton.dataset.detailTab);
      }
    });

    standingsScrollEl.addEventListener("keydown", (event) => {
      if (event.key !== "Enter" && event.key !== " ") {
        return;
      }

      const groupCard = event.target.closest(".group-card[data-group]");
      if (groupCard && standingsOverlay === "standings") {
        event.preventDefault();
        openGroupHistory(groupCard.dataset.group);
      }
    });

    fixturesEl.addEventListener("click", (event) => {
      const card = event.target.closest(".match-card[data-match-key]");
      if (!card) {
        return;
      }

      centerMatchKey = card.dataset.matchKey;
      updateCountdown();
    });

    fixturesEl.addEventListener("keydown", (event) => {
      if (event.key !== "Enter" && event.key !== " ") {
        return;
      }

      const card = event.target.closest(".match-card[data-match-key]");
      if (!card) {
        return;
      }

      event.preventDefault();
      centerMatchKey = card.dataset.matchKey;
      updateCountdown();
    });

    setInterval(updateCountdown, 1000);

    const canvas = document.getElementById("motion");
    const context = canvas.getContext("2d");
    const particles = [];
    const colors = ["#ffd166", "#6ae9ff", "#ff4d5f", "#f8fbff", "#18a05f"];
    let width = 0;
    let height = 0;
    let pixelRatio = 1;

    function resizeCanvas() {
      pixelRatio = Math.min(window.devicePixelRatio || 1, 2);
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = Math.floor(width * pixelRatio);
      canvas.height = Math.floor(height * pixelRatio);
      canvas.style.width = `${width}px`;
      canvas.style.height = `${height}px`;
      context.setTransform(pixelRatio, 0, 0, pixelRatio, 0, 0);
      seedParticles();
    }

    function seedParticles() {
      particles.length = 0;
      const count = Math.min(150, Math.max(70, Math.floor((width * height) / 15000)));
      for (let index = 0; index < count; index += 1) {
        particles.push({
          x: Math.random() * width,
          y: Math.random() * height,
          radius: 0.8 + Math.random() * 2.4,
          speed: 0.25 + Math.random() * 0.75,
          drift: -0.22 + Math.random() * 0.44,
          alpha: 0.16 + Math.random() * 0.48,
          color: colors[Math.floor(Math.random() * colors.length)],
          phase: Math.random() * Math.PI * 2
        });
      }
    }

    function drawNet(time) {
      const horizon = height * 0.52;
      context.save();
      context.globalAlpha = 0.16;
      context.strokeStyle = "#f8fbff";
      context.lineWidth = 1;

      for (let x = -width; x < width * 2; x += 78) {
        context.beginPath();
        context.moveTo(x + Math.sin(time * 0.0004 + x) * 8, horizon);
        context.lineTo(width / 2 + (x - width / 2) * 0.38, height);
        context.stroke();
      }

      for (let y = horizon; y < height; y += 56) {
        const scale = (y - horizon) / Math.max(1, height - horizon);
        context.beginPath();
        context.moveTo(width * (0.06 + scale * 0.18), y);
        context.lineTo(width * (0.94 - scale * 0.18), y + Math.sin(time * 0.0008 + y) * 2);
        context.stroke();
      }

      context.restore();
    }

    function drawParticles(time) {
      for (const particle of particles) {
        particle.y -= particle.speed;
        particle.x += particle.drift + Math.sin(time * 0.001 + particle.phase) * 0.18;

        if (particle.y < -8) {
          particle.y = height + 8;
          particle.x = Math.random() * width;
        }

        if (particle.x < -8) {
          particle.x = width + 8;
        }

        if (particle.x > width + 8) {
          particle.x = -8;
        }

        context.save();
        context.globalAlpha = particle.alpha * (0.7 + Math.sin(time * 0.002 + particle.phase) * 0.3);
        context.fillStyle = particle.color;
        context.beginPath();
        context.arc(particle.x, particle.y, particle.radius, 0, Math.PI * 2);
        context.fill();
        context.restore();
      }
    }

    function drawOrbit(time) {
      const centerX = width * 0.5;
      const centerY = height * 0.49;
      const radiusX = Math.min(width * 0.28, 320);
      const radiusY = Math.min(height * 0.16, 115);
      const ballX = centerX + Math.cos(time * 0.00038) * radiusX;
      const ballY = centerY + Math.sin(time * 0.00038) * radiusY;

      context.save();
      context.lineWidth = 2;
      context.strokeStyle = "rgba(255, 209, 102, 0.16)";
      context.beginPath();
      context.ellipse(centerX, centerY, radiusX, radiusY, -0.16, 0, Math.PI * 2);
      context.stroke();

      const glow = context.createRadialGradient(ballX, ballY, 0, ballX, ballY, 42);
      glow.addColorStop(0, "rgba(255, 209, 102, 0.7)");
      glow.addColorStop(0.22, "rgba(255, 209, 102, 0.26)");
      glow.addColorStop(1, "rgba(255, 209, 102, 0)");
      context.fillStyle = glow;
      context.beginPath();
      context.arc(ballX, ballY, 42, 0, Math.PI * 2);
      context.fill();
      context.restore();
    }

    function animate(time) {
      context.clearRect(0, 0, width, height);
      drawNet(time);
      drawOrbit(time);
      drawParticles(time);
      requestAnimationFrame(animate);
    }

    window.addEventListener("resize", resizeCanvas, { passive: true });
    resizeCanvas();
    requestAnimationFrame(animate);
  </script>
</body>
</html>
